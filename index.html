<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skyrelda Dialogue Tree Editor</title>
    <!-- Tailwind CSS for modern styled UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel Standalone for live JSX translation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body,
      html,
      #root {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background-color: #0f172a;
        color: #e2e8f0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
      }
      /* Grid background effect for the canvas */
      .graph-bg {
        background-size: 40px 40px;
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      }
      /* Hide scrollbars but preserve functionality */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, useMemo } = React;

      // Default initial schema-conforming node graph state
      const INITIAL_STATE = {
        id: "new-conversation-id",
        startNodeId: "start-node",
        worldState: {
          flags: ["met-npc", "has-item"],
        },
        nodes: {
          "start-node": {
            speaker: "Narrator",
            portrait: "none",
            text: "You approach a dusty terminal embedded within the ancient stone structures.",
            x: 150,
            y: 200,
            choices: [
              { label: "Examine the console.", nextNodeId: "examine-console" },
              { label: "Walk away.", nextNodeId: null },
            ],
          },
          "examine-console": {
            speaker: "Terminal AI",
            portrait: "terminal",
            text: "SYSTEM REBOOT IN PROGRESS... Identify yourself, traveler.",
            setsFlag: "met-npc",
            x: 550,
            y: 100,
            conditions: [{ requiresFlag: "has-item", nextNodeId: "special-override" }],
            choices: [{ label: "State your name.", nextNodeId: "success-node", setsFlag: "told-name" }],
          },
          "special-override": {
            speaker: "Terminal AI",
            portrait: "terminal",
            text: "Artifact signature detected. Master override authorized.",
            x: 550,
            y: 400,
            autoNextNodeId: "success-node",
          },
          "success-node": {
            speaker: "Terminal AI",
            portrait: "terminal",
            text: "Access granted. Welcome to the core repository.",
            x: 950,
            y: 250,
            autoNextNodeId: null,
          },
        },
      };

      function App() {
        // Core States
        const [treeId, setTreeId] = useState(INITIAL_STATE.id);
        const [startNodeId, setStartNodeId] = useState(INITIAL_STATE.startNodeId);
        const [nodes, setNodes] = useState(INITIAL_STATE.nodes);
        const [flags, setFlags] = useState(INITIAL_STATE.worldState.flags);

        // View & UI Management States
        const [selectedNodeId, setSelectedNodeId] = useState("start-node");
        const [zoom, setZoom] = useState(1);
        const [pan, setPan] = useState({ x: 0, y: 0 });
        const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);
        const [draggedNodeId, setDraggedNodeId] = useState(null);
        const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
        const [errorMessage, setErrorMessage] = useState("");
        const [searchQuery, setSearchQuery] = useState("");
        const [playtestNodeId, setPlaytestNodeId] = useState(null);
        const [playtestActiveFlags, setPlaytestActiveFlags] = useState([]);

        const canvasRef = useRef(null);

        // Kebab-case validation pattern matching the schema rules
        const validateKebab = str => /^[a-z0-9]+(-[a-z0-9]+)*$/.test(str);

        // Graph canvas dimensions config
        const nodeWidth = 260;
        const nodeHeight = 180;

        // Compute lists of valid nodes and check for structural anomalies
        const brokenLinks = useMemo(() => {
          const broken = [];
          Object.entries(nodes).forEach(([id, node]) => {
            if (node.autoNextNodeId && !nodes[node.autoNextNodeId]) {
              broken.push({ from: id, type: "autoNextNodeId", target: node.autoNextNodeId });
            }
            if (node.conditions) {
              node.conditions.forEach((c, idx) => {
                if (c.nextNodeId && !nodes[c.nextNodeId]) {
                  broken.push({ from: id, type: `condition-${idx}`, target: c.nextNodeId });
                }
              });
            }
            if (node.choices) {
              node.choices.forEach((choice, idx) => {
                if (choice.nextNodeId && !nodes[choice.nextNodeId]) {
                  broken.push({ from: id, type: `choice-${idx}`, target: choice.nextNodeId });
                }
              });
            }
          });
          return broken;
        }, [nodes]);

        const unreachableNodes = useMemo(() => {
          const visited = new Set();
          const queue = [startNodeId];

          while (queue.length > 0) {
            const currentId = queue.shift();
            if (!currentId || visited.has(currentId) || !nodes[currentId]) continue;
            visited.add(currentId);

            const node = nodes[currentId];
            if (node.autoNextNodeId) queue.push(node.autoNextNodeId);
            if (node.conditions) {
              node.conditions.forEach(c => {
                if (c.nextNodeId) queue.push(c.nextNodeId);
              });
            }
            if (node.choices) {
              node.choices.forEach(c => {
                if (c.nextNodeId) queue.push(c.nextNodeId);
              });
            }
          }

          return Object.keys(nodes).filter(id => !visited.has(id));
        }, [nodes, startNodeId]);

        // Handlers: Node operations
        const addNode = () => {
          let baseId = "new-node";
          let counter = 1;
          while (nodes[`${baseId}-${counter}`]) {
            counter++;
          }
          const newId = `${baseId}-${counter}`;

          setNodes(prev => ({
            ...prev,
            [newId]: {
              speaker: "Speaker",
              portrait: "none",
              text: "New dialogue beat entry details...",
              x: 100 - pan.x,
              y: 150 - pan.y,
              choices: [{ label: "Continue", nextNodeId: null }],
            },
          }));
          setSelectedNodeId(newId);
        };

        const deleteNode = idToDelete => {
          if (Object.keys(nodes).length <= 1) {
            alert("A story tree requires at least one active node.");
            return;
          }
          if (confirm(`Are you sure you want to permanently delete node [${idToDelete}]? Links pointing here will break.`)) {
            const updatedNodes = { ...nodes };
            delete updatedNodes[idToDelete];
            setNodes(updatedNodes);
            if (selectedNodeId === idToDelete) {
              setSelectedNodeId(Object.keys(updatedNodes)[0]);
            }
            if (startNodeId === idToDelete) {
              setStartNodeId(Object.keys(updatedNodes)[0]);
            }
          }
        };

        const updateNodeProperty = (id, prop, val) => {
          setNodes(prev => ({
            ...prev,
            [id]: { ...prev[id], [prop]: val },
          }));
        };

        const changeNodeId = (oldId, newId) => {
          if (oldId === newId) return;
          if (!validateKebab(newId)) {
            alert("ID format invalid! Please adhere strictly to kebab-case guidelines.");
            return;
          }
          if (nodes[newId]) {
            alert("Collision risk! A node already uses this unique ID allocation.");
            return;
          }

          const updatedNodes = {};
          Object.entries(nodes).forEach(([id, node]) => {
            let newNodeData = { ...node };
            if (newNodeData.autoNextNodeId === oldId) newNodeData.autoNextNodeId = newId;
            if (newNodeData.conditions) {
              newNodeData.conditions = newNodeData.conditions.map(c => (c.nextNodeId === oldId ? { ...c, nextNodeId: newId } : c));
            }
            if (newNodeData.choices) {
              newNodeData.choices = newNodeData.choices.map(c => (c.nextNodeId === oldId ? { ...c, nextNodeId: newId } : c));
            }

            if (id === oldId) {
              updatedNodes[newId] = newNodeData;
            } else {
              updatedNodes[id] = newNodeData;
            }
          });

          setNodes(updatedNodes);
          if (selectedNodeId === oldId) setSelectedNodeId(newId);
          if (startNodeId === oldId) setStartNodeId(newId);
        };

        // Global State Flag adjustments
        const addFlag = () => {
          let name = prompt("Provide an unique flag identity key (kebab-case preferred):");
          if (!name) return;
          name = name.trim().toLowerCase();
          if (!validateKebab(name)) {
            alert("Flags must comply with standard lower-case alphanumeric kebab-case patterns.");
            return;
          }
          if (flags.includes(name)) return;
          setFlags([...flags, name]);
        };

        const removeFlag = targetFlag => {
          setFlags(flags.filter(f => f !== targetFlag));
        };

        // Canvas Interaction Handling (Panning/Dragging)
        const handleCanvasMouseDown = e => {
          if (e.target.closest(".node-card") || e.target.closest("button") || e.target.closest("input")) return;
          setIsDraggingCanvas(true);
        };

        const handleCanvasMouseMove = e => {
          if (isDraggingCanvas) {
            setPan(prev => ({ x: prev.x + e.movementX, y: prev.y + e.movementY }));
          } else if (draggedNodeId && nodes[draggedNodeId]) {
            const rect = canvasRef.current.getBoundingClientRect();
            const clientX = e.clientX - rect.left;
            const clientY = e.clientY - rect.top;

            // Adjust position calculations mapped against zoom factors
            const targetX = Math.round((clientX - pan.x) / zoom - dragOffset.x);
            const targetY = Math.round((clientY - pan.y) / zoom - dragOffset.y);

            setNodes(prev => ({
              ...prev,
              [draggedNodeId]: { ...prev[draggedNodeId], x: targetX, y: targetY },
            }));
          }
        };

        const handleCanvasMouseUp = () => {
          setIsDraggingCanvas(false);
          setDraggedNodeId(null);
        };

        const zoomIn = () => {
          setZoom(prev => Math.min(1.5, prev + 0.1));
        };

        const zoomOut = () => {
          setZoom(prev => Math.max(0.4, prev - 0.1));
        };

        const handleCanvasWheel = e => {
          e.preventDefault();
          if (e.deltaY < 0) {
            zoomIn();
          } else {
            zoomOut();
          }
        };

        const handleNodeDragStart = (e, id) => {
          e.stopPropagation();
          const rect = e.currentTarget.getBoundingClientRect();
          const offsetComponentsX = (e.clientX - rect.left) / zoom;
          const offsetComponentsY = (e.clientY - rect.top) / zoom;
          setDraggedNodeId(id);
          setDragOffset({ x: offsetComponentsX, y: offsetComponentsY });
          setSelectedNodeId(id);
        };

        const buildExportPayload = () => {
          const outputNodes = {};
          Object.entries(nodes).forEach(([id, srcNode]) => {
            const cleanNode = {
              speaker: srcNode.speaker || "Unknown",
              portrait: srcNode.portrait || "none",
              text: srcNode.text || "",
            };

            if (srcNode.setsFlag) cleanNode.setsFlag = srcNode.setsFlag;
            if (srcNode.conditions && srcNode.conditions.length > 0) {
              cleanNode.conditions = srcNode.conditions.map(c => ({
                requiresFlag: c.requiresFlag,
                nextNodeId: c.nextNodeId,
              }));
            }

            if (srcNode.choices && srcNode.choices.length > 0) {
              cleanNode.choices = srcNode.choices.map(c => {
                const choiceObj = { label: c.label, nextNodeId: c.nextNodeId };
                if (c.requiresFlag) choiceObj.requiresFlag = c.requiresFlag;
                if (c.setsFlag) choiceObj.setsFlag = c.setsFlag;
                if (c.startsQuest) choiceObj.startsQuest = c.startsQuest;
                if (c.completesQuest) choiceObj.completesQuest = c.completesQuest;
                return choiceObj;
              });
            } else if (srcNode.hasOwnProperty("autoNextNodeId")) {
              cleanNode.autoNextNodeId = srcNode.autoNextNodeId;
            } else {
              cleanNode.autoNextNodeId = null;
            }

            cleanNode.editorMetadata = {
              x: Math.round(srcNode.x ?? 100),
              y: Math.round(srcNode.y ?? 100),
            };

            outputNodes[id] = cleanNode;
          });

          return {
            id: treeId,
            startNodeId: startNodeId,
            worldState: { flags: flags },
            nodes: outputNodes,
          };
        };

        // JSON Export Handler matching the structural specifications
        const exportJSON = () => {
          try {
            const payload = buildExportPayload();
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload, null, 2));
            const dlAnchor = document.createElement("a");
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", `${treeId || "dialogue-tree"}.json`);
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
            setErrorMessage("");
          } catch (err) {
            setErrorMessage(`Export sequence encountered structural difficulties: ${err.message}`);
          }
        };

        const copyJSON = async () => {
          try {
            const payload = buildExportPayload();
            const jsonText = JSON.stringify(payload, null, 2);

            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(jsonText);
            } else {
              const tempTextArea = document.createElement("textarea");
              tempTextArea.value = jsonText;
              tempTextArea.setAttribute("readonly", "");
              tempTextArea.style.position = "fixed";
              tempTextArea.style.left = "-9999px";
              document.body.appendChild(tempTextArea);
              tempTextArea.select();
              document.execCommand("copy");
              tempTextArea.remove();
            }

            setErrorMessage("");
          } catch (err) {
            setErrorMessage(`Copy sequence encountered structural difficulties: ${err.message}`);
          }
        };
        // JSON File Safe Parse Importer
        const importJSON = e => {
          const fileReader = new FileReader();
          if (!e.target.files || e.target.files.length === 0) return;

          fileReader.onload = event => {
            try {
              const data = JSON.parse(event.target.result);

              if (!data.id || typeof data.id !== "string")
                throw new Error("Missing structural asset property: 'id' key string verification.");
              if (!data.startNodeId) throw new Error("File context missing operational property target configuration: 'startNodeId'.");
              if (!data.nodes || typeof data.nodes !== "object" || Array.isArray(data.nodes)) {
                throw new Error("Invalid operational nodes block design format provided.");
              }

              setTreeId(data.id);
              setStartNodeId(data.startNodeId);

              // 1. Gather any explicitly declared global flags
              const extractedFlags = new Set();
              if (data.worldState && Array.isArray(data.worldState.flags)) {
                data.worldState.flags.forEach(f => extractedFlags.add(f));
              }

              // 2. Deep-scan all nodes to harvest any implicitly used flags so nothing is left out
              Object.values(data.nodes).forEach(node => {
                if (node.setsFlag) extractedFlags.add(node.setsFlag);

                if (node.conditions) {
                  node.conditions.forEach(c => {
                    if (c.requiresFlag) extractedFlags.add(c.requiresFlag);
                  });
                }

                if (node.choices) {
                  node.choices.forEach(c => {
                    if (c.requiresFlag) extractedFlags.add(c.requiresFlag);
                    if (c.setsFlag) extractedFlags.add(c.setsFlag);
                  });
                }
              });

              // 3. Commit the unique collection back to our reactive environment state
              setFlags(Array.from(extractedFlags));

              const rehydratedNodes = {};
              let indexCount = 0;
              Object.entries(data.nodes).forEach(([key, value]) => {
                // Look for positioning data inside the metadata block, fall back to historical layout properties or auto-grid mapping
                const metadataX = value.editorMetadata?.x ?? value.x;
                const metadataY = value.editorMetadata?.y ?? value.y;

                rehydratedNodes[key] = {
                  ...value,
                  x: metadataX ?? 80 + (indexCount % 3) * 360,
                  y: metadataY ?? 80 + Math.floor(indexCount / 3) * 260,
                };
                indexCount++;
              });

              setNodes(rehydratedNodes);
              const firstKey = Object.keys(rehydratedNodes)[0];
              setSelectedNodeId(rehydratedNodes[data.startNodeId] ? data.startNodeId : firstKey);
              setErrorMessage("");
              alert("Dialogue graph system dataset state rehydrated successfully!");
            } catch (err) {
              setErrorMessage(`Import Error: ${err.message}`);
            }
          };
          fileReader.readAsText(e.target.files[0]);
        };

        // Playtest Evaluation Pipeline Engine
        const normalizeFlags = value => {
          if (Array.isArray(value)) return value;
          if (typeof value === "string" && value.trim()) return [value.trim()];
          return [];
        };

        const startPlaytest = (initialFlags = flags) => {
          const seededFlags = normalizeFlags(initialFlags);
          setPlaytestActiveFlags(seededFlags);
          // Check if conditional routing triggers right away on start node
          evaluateAndGo(startNodeId, seededFlags);
        };

        const togglePlaytestFlag = flag => {
          setPlaytestActiveFlags(prev => {
            const currentFlags = normalizeFlags(prev);
            return currentFlags.includes(flag) ? currentFlags.filter(f => f !== flag) : [...currentFlags, flag];
          });
        };

        const clearPlaytestFlags = () => {
          setPlaytestActiveFlags([]);
        };

        const restorePlaytestFlags = () => {
          setPlaytestActiveFlags(normalizeFlags(flags));
        };

        const evaluateAndGo = (targetId, currentFlags) => {
          if (!targetId || !nodes[targetId]) {
            setPlaytestNodeId(targetId); // Marks end or broken path
            return;
          }

          const nodeData = nodes[targetId];
          let nextTarget = targetId;
          let traversed = true;
          let activeFlags = [...currentFlags];

          // Check self triggering node structural flag hooks
          if (nodeData.setsFlag && !activeFlags.includes(nodeData.setsFlag)) {
            activeFlags.push(nodeData.setsFlag);
          }

          // First checking matching sequence conditions
          if (nodeData.conditions && nodeData.conditions.length > 0) {
            for (let cond of nodeData.conditions) {
              if (activeFlags.includes(cond.requiresFlag)) {
                nextTarget = cond.nextNodeId;
                traversed = false;
                break;
              }
            }
          }

          setPlaytestActiveFlags(activeFlags);
          if (!traversed) {
            evaluateAndGo(nextTarget, activeFlags);
          } else {
            setPlaytestNodeId(targetId);
          }
        };

        const handlePlaytestChoice = choice => {
          let currentFlags = [...playtestActiveFlags];
          if (choice.setsFlag && !currentFlags.includes(choice.setsFlag)) {
            currentFlags.push(choice.setsFlag);
          }
          setPlaytestActiveFlags(currentFlags);
          evaluateAndGo(choice.nextNodeId, currentFlags);
        };

        // Utility connections line calculations rendering calculations paths
        const getConnectorPath = (fromId, toId) => {
          const source = nodes[fromId];
          const target = nodes[toId];
          if (!source || !target) return "";

          const startX = source.x + nodeWidth;
          const startY = source.y + nodeHeight / 2;
          const endX = target.x;
          const endY = target.y + nodeHeight / 2;

          const controlX1 = startX + 80;
          const controlY1 = startY;
          const controlX2 = endX - 80;
          const controlY2 = endY;

          return `M ${startX} ${startY} C ${controlX1} ${controlY1}, ${controlX2} ${controlY2}, ${endX} ${endY}`;
        };

        const activeNodeData = nodes[selectedNodeId] || null;

        return (
          <div className="flex flex-col h-screen select-none bg-slate-950 font-sans">
            {/* Top Control Header Bar Area */}
            <header className="flex items-center justify-between px-6 py-3 bg-slate-900 border-b border-slate-800 shrink-0 shadow-md z-10">
              <div className="flex items-center gap-3">
                <i className="fa-solid fa-square-share-nodes text-indigo-400 text-2xl"></i>
                <div>
                  <h1 className="text-sm font-bold tracking-wider text-slate-200 uppercase">Skyrelda Core</h1>
                  <input
                    type="text"
                    value={treeId}
                    onChange={e => setTreeId(e.target.value.trim().toLowerCase())}
                    className="bg-transparent border-b border-slate-700 text-indigo-300 font-mono font-medium focus:outline-none focus:border-indigo-400 text-xs py-0.5"
                    placeholder="conversation-id"
                  />
                </div>
                <a
                  href="https://github.com/jyoung4242/dialogEditor"
                  target="_blank"
                  rel="noopener noreferrer"
                  className="text-xs font-medium text-slate-400 hover:text-indigo-300 transition"
                >
                  README
                </a>
              </div>
              

              {/* Search Bar Integration */}
              <div className="flex items-center bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 w-64">
                <i className="fa-solid fa-magnifying-glass text-slate-500 text-xs mr-2"></i>
                <input
                  type="text"
                  placeholder="Search dialogue nodes text..."
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  className="bg-transparent text-xs text-slate-300 focus:outline-none w-full"
                />
              </div>

              {/* Top Control Button Cluster Grid Layout */}
              <div className="flex items-center gap-2">
                <button
                  onClick={addNode}
                  className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold bg-emerald-600 hover:bg-emerald-500 text-white rounded transition"
                >
                  <i className="fa-solid fa-plus"></i> Node
                </button>

                <button
                  onClick={startPlaytest}
                  className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold bg-indigo-600 hover:bg-indigo-500 text-white rounded transition"
                >
                  <i className="fa-solid fa-gamepad"></i> Run Test
                </button>
                <label className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold bg-slate-800 hover:bg-slate-700 text-slate-300 rounded border border-slate-700 transition cursor-pointer">
                  <i className="fa-solid fa-file-import"></i> Import
                  <input type="file" accept=".json" onChange={importJSON} className="hidden" />
                </label>
                <button
                  onClick={copyJSON}
                  className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold bg-emerald-600 hover:bg-emerald-500 text-white rounded transition"
                >
                  <i className="fa-solid fa-copy"></i> Copy JSON
                </button>
                <button
                  onClick={exportJSON}
                  className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold bg-indigo-500 hover:bg-indigo-400 text-white rounded transition"
                >
                  <i className="fa-solid fa-file-export"></i> Export JSON
                </button>
              </div>
            </header>

            {/* Notification System Indicator Row banner */}
            {errorMessage && (
              <div className="bg-rose-950 border-b border-rose-800 px-6 py-2 flex items-center justify-between text-xs text-rose-300 animate-pulse">
                <span className="flex items-center gap-2">
                  <i className="fa-solid fa-triangle-exclamation"></i> {errorMessage}
                </span>
                <button onClick={() => setErrorMessage("")} className="text-rose-400 hover:text-rose-200">
                  <i className="fa-solid fa-xmark"></i>
                </button>
              </div>
            )}

            {/* Layout Framework Core View Workspace Container Body split panels */}
            <div className="flex flex-1 overflow-hidden relative">
              {/* LEFT SECTION PANELS FRAMEWORK COMPONENT LAYOUT WORKSPACE */}
              <div className="flex-1 relative overflow-hidden h-full">
                {/* Canvas control layer scale interfaces overlay */}
                <div className="absolute bottom-4 left-4 bg-slate-900/90 border border-slate-800 rounded-lg p-1.5 flex gap-1 z-10 shadow-xl backdrop-blur-sm">
                  <button
                    onClick={zoomOut}
                    className="w-8 h-8 rounded bg-slate-800 hover:bg-slate-700 flex items-center justify-center text-xs text-slate-300 transition"
                  >
                    <i className="fa-solid fa-minus"></i>
                  </button>
                  <span className="px-2 flex items-center justify-center font-mono text-xs text-slate-400 min-w-14">
                    {Math.round(zoom * 100)}%
                  </span>
                  <button
                    onClick={zoomIn}
                    className="w-8 h-8 rounded bg-slate-800 hover:bg-slate-700 flex items-center justify-center text-xs text-slate-300 transition"
                  >
                    <i className="fa-solid fa-plus"></i>
                  </button>
                  <button
                    onClick={() => {
                      setZoom(1);
                      setPan({ x: 0, y: 0 });
                    }}

                  <div className="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar">
                    {nodes[playtestNodeId] ? (
                      (() => {

                        return (

                        <div className="w-16 h-16 bg-slate-950 rounded-full flex items-center justify-center text-2xl mx-auto shadow-inner">

                  <div className="px-5 py-3 bg-slate-950 border-t border-slate-800 flex items-center justify-between text-[10px] text-slate-500 font-mono shrink-0">
